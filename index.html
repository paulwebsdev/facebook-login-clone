<!DOCTYPE html>
<html>
<head>
    <title>Facebook Clone</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Facebook Login</h2>
    <input type="text" placeholder="Email or Phone">
    <input type="password" placeholder="Password">
    <button>Log In</button>
</div>

</body>
</html>
